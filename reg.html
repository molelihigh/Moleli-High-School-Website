<!DOCTYPE html>
<html>
<head>
 <link rel="icon" type="image/x-icon" href="molelilogo.png">
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>School Registration - Moleli High School</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color:#e8f5e9;
    margin:0;
    padding:0;
}

header{
    background-color:green;
    color:white;
    text-align:center;
    padding:20px;
}

.form-container{
    background:white;
    width:80%;
    max-width:700px;
    margin:40px auto;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    color:green;
    text-align:center;
}

label{
    font-weight:bold;
}

input, select, textarea{
    width:100%;
    padding:12px;
    margin-top:5px;
    margin-bottom:20px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

button{
    background-color:red;
    color:white;
    padding:12px 25px;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background-color:darkred;
}

footer{
    background-color:#0b3d0b;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}

</style>

</head>

<body>

<header>

<h1>Moleli High School Registration</h1>

<p>Apply Online</p>

</header>

<div class="form-container">

<h2>Student Registration Form</h2>

<!-- FORMSPREE FORM -->
<form action="https://formspree.io/f/mdajnbyd" method="POST">

<label>Full Name</label>
<input type="text" name="fullname" required>

<label>Date of Birth</label>
<input type="date" name="dob" required>

<label>Gender</label>
<select name="gender" required>
    <option value="">Select Gender</option>
    <option>Male</option>
    <option>Female</option>
</select>

<label>Email Address</label>
<input type="email" name="email" required>

<label>Phone Number</label>
<input type="tel" name="phone" required>

<label>Parent/Guardian Name</label>
<input type="text" name="guardian" required>

<label>Parent/Guardian Phone</label>
<input type="tel" name="guardianphone" required>

<label>Address</label>
<textarea name="address" rows="4" required></textarea>

<label>Grade Applying For</label>
<select name="grade" required>
    <option value="">Select Grade</option>
    <option>Form 1</option>
    <option>Form 2</option>
    <option>Form 3</option>
    <option>Form 4</option>
    <option>Lower 6</option>
    <option>Upper 6</option>
</select>

<label>Previous School</label>
<input type="text" name="previousschool">

<label>Reason for Applying</label>
<textarea name="reason" rows="5"></textarea>

<button type="submit">
    Submit Registration
</button>

</form>

</div>

<footer>

<p>
© 2026 Moleli High School | Online Registration System
</p>

</footer>

</body>
</html>
